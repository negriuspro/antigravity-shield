name: Deploy antigravity-shield

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to angel-server
    runs-on: [self-hosted, linux, antigravity-shield]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy
        id: deploy
        run: bash /home/angel/deploy/deploy-antigravity-shield.sh

      - name: Verify containers
        if: always()
        run: |
          echo "--- Estado de contenedores ---"
          docker ps --filter name=antigravity-shield --format "table {{.Names}}	{{.Status}}	{{.Ports}}"

      - name: Health check final
        run: |
          sleep 5
          if curl -sf http://127.0.0.1/health 2>/dev/null; then
            echo "OK — nginx :80 responde"
          elif nc -z 127.0.0.1 80 2>/dev/null; then
            echo "OK — Puerto :80 abierto"
          else
            echo "WARN — Puerto :80 no responde (puede ser normal en hairpin NAT)"
          fi

      - name: Deploy log (ultimas lineas)
        if: always()
        run: tail -20 /home/angel/deploy/deploy.log || true
