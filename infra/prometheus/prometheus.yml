global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: adblock-network

alerting:
  alertmanagers: []
  # To enable alerts, add alertmanager service and uncomment:
  # alertmanagers:
  #   - static_configs:
  #       - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: ag-ai
    static_configs:
      - targets: ["ag-ai:8001"]
    metrics_path: /metrics

  # node-exporter runs with network_mode: host.
  # From inside prometheus container, reach host via host.docker.internal
  # (prometheus service has extra_hosts: ["host.docker.internal:host-gateway"])
  - job_name: node-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: adguard
    scrape_interval: 30s
    static_configs:
      - targets: ["adguard-exporter:9617"]
    metrics_path: /metrics

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
    metrics_path: /metrics
