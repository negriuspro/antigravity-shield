http:
  pprof:
    port: 6060
    enabled: false
  address: 0.0.0.0:3000
  session_ttl: 720h

users: []   # First run: AdGuard asks you to create an admin via wizard

auth_attempts: 5
block_auth_min: 15

# ─── DNS Core ────────────────────────────────────────────────
dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  anonymize_client_ip: false

  # Upstream chain: Cloudflare primary → Quad9 → Google fallback
  upstream_dns:
    - https://dns.cloudflare.com/dns-query        # Cloudflare DoH (primary)
    - tls://1dot1dot1dot1.cloudflare.com           # Cloudflare DoT
    - https://cloudflare-dns.com/dns-query         # Cloudflare DoH alt
    - https://dns.quad9.net/dns-query              # Quad9 DoH (fallback 1)
    - tls://dns.quad9.net                          # Quad9 DoT
    - 9.9.9.9                                      # Quad9 plain UDP
    - 149.112.112.112                              # Quad9 plain UDP alt
    - 8.8.8.8                                      # Google (fallback 2)
    - 8.8.4.4                                      # Google alt

  # Bootstrap resolvers for DoH/DoT hostname resolution (must be plain UDP)
  bootstrap_dns:
    - 1.1.1.1
    - 1.0.0.1
    - 9.9.9.9
    - 8.8.8.8

  fallback_dns:
    - 8.8.8.8
    - 8.8.4.4

  # Query all upstreams in parallel and use the fastest response
  upstream_mode: parallel
  fastest_timeout: 1s

  # DNSSEC validation
  dnssec_enabled: true

  # Privacy: do NOT send client subnet info to upstreams
  edns_cs_enabled: false
  edns_cs_use_custom: false

  # DNS cache — bigger helps on old hardware (fewer upstream queries)
  cache_size: 8388608   # 8 MB
  cache_ttl_min: 600    # 10 min minimum TTL
  cache_ttl_max: 86400  # 24h maximum TTL
  cache_optimistic: true  # Serve stale while revalidating in background

  # Rate limiting (protects old PC from DNS flood)
  ratelimit: 20
  ratelimit_subnet_len_ipv4: 24
  ratelimit_subnet_len_ipv6: 56
  ratelimit_whitelist: []

  # Refuse ANY queries (reduces amplification risk)
  refuse_any: true

  # Local network
  local_domain_name: local
  resolve_clients: true

  # Safe Browsing (AdGuard cloud service)
  safebrowsing_enabled: true
  safebrowsing_cache_size: 1048576

  # Safe Search (forces safe mode on Google/Bing/YouTube/etc.)
  safe_search:
    enabled: false    # Set true for family/school networks
    bing: false
    duckduckgo: false
    google: false
    pixabay: false
    yandex: false
    youtube: false

  # Parental control
  parental_enabled: false
  parental_cache_size: 1048576

  # Addresses to use when blocking (empty = return NXDOMAIN)
  blocking_mode: default
  blocking_ipv4: ""
  blocking_ipv6: ""

  # Minimum allowed TTL in responses
  serve_plain_dns: true

  # AAAA records (set true to block IPv6 DNS if router has issues)
  aaaa_disabled: false

  blocked_response_ttl: 10

# ─── Query Log ────────────────────────────────────────────────
querylog:
  enabled: true
  file_enabled: true
  interval: 720h        # 30 days retention
  size_memory: 1000     # entries kept in RAM
  anonymize_client_ip: false

# ─── Statistics ───────────────────────────────────────────────
statistics:
  enabled: true
  interval: 168h   # 7 days
  limit: 0         # 0 = unlimited

# ─── Blocklists ───────────────────────────────────────────────
# All lists auto-update every 24h (see filtering.filters_update_interval)
filters:
  # === Core AdGuard filters ===
  - enabled: true
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    name: AdGuard DNS Filter
    id: 1

  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
    name: AdGuard DNS Filter (Registry)
    id: 2

  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
    name: AdGuard Mobile Ads & Trackers
    id: 3

  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_4.txt
    name: AdGuard Social Media Trackers
    id: 4

  # === General ad blocking ===
  - enabled: true
    url: https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
    name: Steven Black - Unified (Ads + Malware)
    id: 5

  - enabled: true
    url: https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling-porn/hosts
    name: Steven Black - Fakenews + Gambling + Porn
    id: 6

  # === HaGeZi (high quality, updated daily) ===
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/multi.txt
    name: HaGeZi Multi Normal
    id: 7

  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/tif.txt
    name: HaGeZi Threat Intelligence Feeds
    id: 8

  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/doh.txt
    name: HaGeZi - Anti-DoH Bypass
    id: 9

  # === Malware / Phishing ===
  - enabled: true
    url: https://malware-filter.gitlab.io/malware-filter/urlhaus-filter-agh.txt
    name: URLhaus Malware Filter
    id: 10

  - enabled: true
    url: https://phishing.army/download/phishing_army_blocklist_extended.txt
    name: Phishing Army Extended
    id: 11

  - enabled: true
    url: https://raw.githubusercontent.com/DandelionSprout/adfilt/master/Alternate%20versions%20Anti-Malware%20List/AntiMalwareAdGuardHome.txt
    name: DandelionSprout Anti-Malware
    id: 12

  # === Privacy / Tracking ===
  - enabled: true
    url: https://raw.githubusercontent.com/nicehash/NiceHash-MiningBlockList/master/adguard.txt
    name: NiceHash Crypto Mining Block
    id: 13

  - enabled: true
    url: https://raw.githubusercontent.com/crazy-max/WindowsSpyBlocker/master/data/hosts/spy.txt
    name: WindowsSpyBlocker Spy
    id: 14

  # === Optional: more aggressive (disabled by default) ===
  - enabled: false
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.txt
    name: HaGeZi Multi Pro (aggressive — may break sites)
    id: 100

  - enabled: false
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/ultimate.txt
    name: HaGeZi Ultimate (very aggressive)
    id: 101

whitelist_filters: []

# ─── Filtering settings ───────────────────────────────────────
filtering:
  rewrites: []
  filters_update_interval: 24     # Hours between auto-updates
  parental_block_host: family-block.dns.adguard.com
  safebrowsing_block_host: standard-block.dns.adguard.com
  protection_enabled: true
  protection_disabled_until: null

# ─── Blocked services ─────────────────────────────────────────
# Uncomment services you want to block network-wide
blocked_services:
  schedule:
    time_zone: America/Bogota
  ids: []
  # ids:
  #   - tiktok
  #   - facebook
  #   - discord

# ─── User rules (highest priority) ───────────────────────────
user_rules:
  - "# === Custom allowlist ==="
  - "@@||github.com^"
  - "@@||githubusercontent.com^"
  - "@@||gitlab.com^"
  - "@@||npmjs.com^"
  - "@@||pypi.org^"
  - "@@||docker.io^"
  - "@@||ghcr.io^"
  - "# === Custom blocklist ==="
  - "# ||example-ad-domain.com^"

# ─── DHCP (disabled — let the router handle it) ───────────────
dhcp:
  enabled: false
  interface_name: ""
  local_domain_name: lan
  dhcpv4:
    gateway_ip: ""
    subnet_mask: ""
    range_start: ""
    range_end: ""
    lease_duration: 86400
    icmp_timeout_msec: 1000
    options: []
  dhcpv6:
    range_start: ""
    lease_duration: 86400
    ra_slaac_only: false
    ra_allow_slaac: false

# ─── Clients (optional static client names) ───────────────────
clients:
  runtime_sources:
    whois: true
    arp: true
    rdns: true
    dhcp: true
    hosts: true
  persistent: []

# ─── Logging ──────────────────────────────────────────────────
log:
  enabled: true
  file: ""
  max_backups: 3
  max_size: 50       # MB per log file
  max_age: 7         # days
  compress: true
  local_time: true
  verbose: false

os:
  group: ""
  user: ""
  rlimit_nofile: 0

schema_version: 28
